version: '3.8'

services:
  neo4j:
    image: neo4j:5-community
    container_name: rice-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/rice-agent-2026
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - ./data/neo4j:/data
      - ./data/neo4j/logs:/logs
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "rice-agent-2026", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: rice-agent-backend
    ports:
      - "8000:8000"
    depends_on:
      neo4j:
        condition: service_healthy
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=rice-agent-2026
      - OLLAMA_HOST=http://host.docker.internal:11434
      - LLM_PROVIDER=${LLM_PROVIDER:-ollama}
      - LLM_MODEL=${LLM_MODEL:-qwen2.5:3b}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./data/documents:/app/data/documents
      - ./data/chroma_db:/app/data/chroma_db
