<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>水稻种植智能 Agent</title>
<style>
:root { color-scheme: light; }
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:#f5f5f0; height:100vh; display:flex; }
.main { flex:1; display:flex; flex-direction:column; max-width:800px; margin:0 auto; width:100%; }
.header { background:#2e7d32; color:#fff; padding:14px 20px; font-size:1.1rem; font-weight:600; }
.header span { font-size:0.8rem; opacity:0.8; margin-left:8px; }
.chat-box { flex:1; overflow-y:auto; padding:16px; }
.msg { margin-bottom:14px; display:flex; gap:10px; }
.msg.user { justify-content:flex-end; }
.msg .bubble { max-width:75%; padding:10px 14px; border-radius:12px; font-size:0.9rem; line-height:1.5; }
.msg.user .bubble { background:#e3f2fd; color:#1565c0; }
.msg.assistant .bubble { background:#fff; color:#2d2d2d; border:1px solid #e0e0e0; }
.msg.assistant .bubble.clarify { background:#fff8e1; border-color:#ffcc80; }
.msg .label { font-size:0.7rem; color:#888; margin-bottom:2px; }
.input-area { padding:12px 16px; background:#fff; border-top:1px solid #e0e0e0; display:flex; gap:8px; }
.input-area input { flex:1; padding:10px 14px; border:1.5px solid #ddd; border-radius:24px; font-size:0.9rem; outline:none; }
.input-area input:focus { border-color:#4a8c3f; }
.input-area button { background:#2e7d32; color:#fff; border:none; padding:10px 24px; border-radius:24px; cursor:pointer; font-size:0.9rem; font-weight:500; }
.input-area button:disabled { opacity:0.5; cursor:not-allowed; }

/* 推理侧边栏 */
.sidebar { width:300px; background:#fff; border-left:2px solid #e0e0e0; padding:16px; overflow-y:auto; font-size:0.82rem; display:flex; flex-direction:column; gap:12px; }
.sidebar h3 { font-size:0.9rem; color:#2e7d32; margin-bottom:4px; }
.sidebar .trace-block { background:#fafafa; border-radius:8px; padding:10px 12px; border:1px solid #eee; }
.sidebar .trace-block .node-name { font-weight:600; color:#333; font-size:0.78rem; margin-bottom:4px; }
.sidebar .trace-block .node-data { color:#666; font-size:0.75rem; white-space:pre-wrap; word-break:break-all; }
.sidebar .trace-block.active { border-color:#4a8c3f; background:#f1f8e9; }
.sidebar .empty { color:#aaa; text-align:center; margin-top:40px; font-size:0.85rem; }
.loading { display:flex; align-items:center; gap:6px; color:#888; font-size:0.78rem; padding:4px 0; }
.loading .dot { width:6px; height:6px; border-radius:50%; background:#4a8c3f; animation:bounce 1.4s infinite ease-in-out both; }
.loading .dot:nth-child(1) { animation-delay:-0.32s; }
.loading .dot:nth-child(2) { animation-delay:-0.16s; }
@keyframes bounce { 0%,80%,100% { transform:scale(0); } 40% { transform:scale(1); } }
.sources { margin-top:8px; padding-top:6px; border-top:1px solid #e8e8e8; font-size:0.7rem; color:#999; line-height:1.6; }
</style>
</head>
<body>

<div class="main">
  <div class="header">🌾 水稻种植智能 Agent <span>v2.0 — LangGraph · 知识图谱推理</span></div>
  <div class="chat-box" id="chatBox"></div>
  <div class="input-area">
    <input type="text" id="questionInput" placeholder="描述水稻症状或提问种植知识…" onkeydown="if(event.key==='Enter')send()">
    <button id="sendBtn" onclick="send()">发送</button>
  </div>
</div>

<aside class="sidebar" id="sidebar">
  <h3>🧠 推理过程</h3>
  <div id="traceArea"><div class="empty">等待提问…</div></div>
</aside>

<script>
const CHAT_URL = '/chat/stream';
let sessionId = 'sid_' + Math.random().toString(36).slice(2,10);
let currentNode = null;
let lastBubble = null;

function addMessage(role, content, nodeType) {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  const bubble = document.createElement('div');
  bubble.className = 'bubble' + (nodeType === 'clarify' ? ' clarify' : '');
  if (role === 'assistant') {
    const label = document.createElement('div');
    label.className = 'label';
    label.textContent = nodeType === 'clarify' ? 'Agent 追问' : 'Agent';
    bubble.appendChild(label);
  }
  const text = document.createElement('div');
  text.textContent = content;
  bubble.appendChild(text);
  div.appendChild(bubble);
  document.getElementById('chatBox').appendChild(div);
  document.getElementById('chatBox').scrollTop = document.getElementById('chatBox').scrollHeight;

  // 记住最后一条助手回答，供 sources 事件追加引用
  if (role === 'assistant' && (nodeType === 'generate' || !nodeType)) {
    lastBubble = bubble;
  }

  return bubble;
}

function addTraceBlock(nodeName, status, data) {
  const traceArea = document.getElementById('traceArea');
  // 清空首次
  if (traceArea.querySelector('.empty')) traceArea.innerHTML = '';

  const block = document.createElement('div');
  block.className = 'trace-block' + (status === 'complete' ? '' : ' active');
  block.id = 'trace-' + nodeName;

  const nameEl = document.createElement('div');
  nameEl.className = 'node-name';
  const statusIcon = status === 'complete' ? '✅' : '⏳';
  nameEl.textContent = `${statusIcon} ${nodeName}`;
  block.appendChild(nameEl);

  if (data) {
    const dataEl = document.createElement('div');
    dataEl.className = 'node-data';
    dataEl.textContent = typeof data === 'string' ? data : JSON.stringify(data, null, 2);
    block.appendChild(dataEl);
  }

  traceArea.appendChild(block);
  document.getElementById('sidebar').scrollTop = document.getElementById('sidebar').scrollHeight;
}

async function send() {
  const input = document.getElementById('questionInput');
  const btn = document.getElementById('sendBtn');
  const question = input.value.trim();
  if (!question) return;

  input.disabled = true;
  btn.disabled = true;

  addMessage('user', question);

  // 清空推理追踪
  document.getElementById('traceArea').innerHTML = '';

  try {
    const response = await fetch(CHAT_URL, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({session_id: sessionId, question})
    });

    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const {done, value} = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, {stream: true});
      const lines = buffer.split('\n');
      buffer = lines.pop() || '';

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const data = line.slice(6);
        if (data === '[DONE]') {
          break;
        }
        try {
          const event = JSON.parse(data);
          if (event.type === 'node_event') {
            addTraceBlock(event.node, event.status, event.data);
          } else if (event.type === 'clarify') {
            addMessage('assistant', event.content, 'clarify');
          } else if (event.type === 'answer') {
            addMessage('assistant', event.content, 'generate');
          } else if (event.type === 'sources') {
            // 在最后一条回答气泡下方显示小字来源
            if (lastBubble && event.content && event.content.length > 0) {
              const srcDiv = document.createElement('div');
              srcDiv.className = 'sources';
              const lines = event.content.map(s =>
                '📎 ' + (s.source || '') + '（相关度：' + (s.relevance || 0) + '）'
              );
              srcDiv.textContent = lines.join('\n');
              lastBubble.appendChild(srcDiv);
            }
          } else if (event.type === 'error') {
            addMessage('assistant', '系统错误: ' + event.content);
          }
        } catch(e) {}
      }
    }
  } catch(e) {
    addMessage('assistant', '请求失败: ' + e.message);
  }

  input.value = '';
  input.disabled = false;
  btn.disabled = false;
  input.focus();
}
</script>
</body>
</html>
